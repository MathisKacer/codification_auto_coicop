project:
  type: website
  output-dir: ../outputs/site

website:
  title: "Codification automatique COICOP"
  site-url: "https://{Owner}.github.io/{Name}/"
  repo-url: "https://github.com/{Owner}/{Name}"
  page-footer:
    left: "Rapport de stage — codification automatique COICOP"
  navbar:
    search: true
    left:
      - href: index.qmd
        text: Accueil
      - href: stats-descriptives/index.qmd
        text: "Fiabilité des classifieurs"
      - href: modelisation.qmd
        text: Modélisation
      - href: interpretation/index.qmd
        text: Interprétation
  sidebar:
    - id: fiabilite-classifieurs
      title: "Fiabilité des classifieurs"
      style: docked
      contents:
        - stats-descriptives/apercu-donnees.qmd
        - stats-descriptives/index.qmd
        - stats-descriptives/accords-unanimes.qmd
        - stats-descriptives/trois-contre-un.qmd
        - stats-descriptives/seul-correct.qmd

format:
  html:
    theme: flatly
    toc: true
    toc-depth: 3
    df-print: default

jupyter: python3

execute:
  echo: false
  warning: false
  freeze: auto
